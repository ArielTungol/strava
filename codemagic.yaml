workflows:
  ios-free-build:
    name: iOS Free Accounts Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
        - $FCI_BUILD_DIR/ios/Pods
    scripts:
      - name: Setup Dependencies
        script: |
          echo "📦 Getting Flutter packages..."
          flutter pub get
          flutter precache --ios

      - name: Generate Hive Adapters
        script: |
          echo "🔨 Generating code..."
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        script: |
          echo "📱 Installing CocoaPods..."
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS App
        script: |
          echo "🏗️ Building iOS app..."
          flutter build ios --release --no-codesign
          
          # Verify build succeeded
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ Build successful! Creating IPA..."
          
            # Create IPA for distribution
            mkdir -p build/ios/iphoneos/Payload
            cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          
            cd build/ios/iphoneos
            zip -r ../../../unsigned_app.ipa Payload
            cd ../../..
          
            echo "✅ IPA created successfully: unsigned_app.ipa"
            echo "✅ Build completed!"
          else
            echo "❌ Error: Build failed - Runner.app not found"
            echo "Debug: Listing contents of build/ios/iphoneos:"
            ls -la build/ios/iphoneos/ || true
            exit 1
          fi

    artifacts:
      - unsigned_app.ipa
      - build/ios/iphoneos/Runner.app