workflows:
  ios-free-build:
    name: iOS Free Accounts Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
        - $FCI_BUILD_DIR/ios/Pods
    scripts:
      - name: Setup Dependencies
        script: |
          echo "📦 Getting Flutter packages..."
          flutter pub get
          flutter precache --ios

      - name: Generate Hive Adapters
        script: |
          echo "🔨 Generating code..."
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        script: |
          echo "📱 Installing CocoaPods..."
          cd ios
          
          # Clean existing pods for fresh install
          rm -rf Pods
          rm -f Podfile.lock
          
          # Install pods
          pod install --repo-update
          cd ..

      - name: Build iOS App
        script: |
          echo "🏗️ Building iOS app..."
          
          # Build the iOS app without code signing (for free accounts)
          flutter build ios --release --no-codesign
          
          # Check if build succeeded
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ Build successful! Creating IPA..."
          
            # Create IPA for distribution
            cd build/ios/iphoneos
          
            # Create Payload directory and package the app
            mkdir -p Payload
            cp -r Runner.app Payload/
          
            # Create IPA file
            zip -r ../../../strava_app.ipa Payload
            cd ../../..
          
            # Verify IPA was created
            if [ -f "strava_app.ipa" ]; then
              echo "✅ IPA created successfully: strava_app.ipa"
              ls -la strava_app.ipa
            else
              echo "❌ Failed to create IPA"
              exit 1
            fi
          else
            echo "❌ Error: Build failed - Runner.app not found"
            echo "Debug: Listing contents of build/ios:"
            ls -la build/ios/ || true
            echo "Debug: Listing contents of build/ios/iphoneos:"
            ls -la build/ios/iphoneos/ || true
            exit 1
          fi

      - name: Post-build cleanup
        script: |
          echo "🧹 Cleaning up..."
          # Optional: Add any cleanup tasks here

    artifacts:
      - strava_app.ipa
      - build/ios/iphoneos/Runner.app
      - build/ios/iphonesimulator/Runner.app

    publishing:
      email:
        recipients:
          - your-email@example.com  # Change to your email