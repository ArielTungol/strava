name: strava_clone
description: A complete Strava-like fitness tracking app for iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Riverpod for state management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Maps
  flutter_map: ^8.2.2
  flutter_map_cancellable_tile_provider: ^3.1.1
  latlong2: ^0.9.1

  # Location
  geolocator: ^14.0.2

  # Networking
  http: ^1.3.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Permissions
  permission_handler: ^12.0.1

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5
  equatable: ^2.0.5

  # UI Enhancements
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  share_plus: ^10.1.2
  url_launcher: ^6.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Background Tasks (optional - for activity reminders)
  workmanager: ^0.5.2
  background_fetch: ^1.3.8

  # REMOVE these if you don't need them:
  # # Authentication
  # firebase_core: ^3.8.0
  # # firebase_auth: ^5.3.3
  # # google_sign_in: ^6.2.2
  # # sign_in_with_apple: ^6.1.4
  #
  # # Wearable Integration
  # health: ^12.0.0
  # wear: ^1.0.0
  #
  # # Media (remove if not using)
  # image_picker: ^1.1.2
  # video_player: ^2.9.2
  # chewie: ^1.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/avatars/