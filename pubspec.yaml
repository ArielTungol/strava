name: strava
description: A Strava-like fitness tracking app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Maps - Latest versions
  flutter_map: ^8.2.2  # Upgraded to latest
  flutter_map_cancellable_tile_provider: ^3.1.1  # Works with flutter_map 8.x
  latlong2: ^0.9.1

  # Location
  geolocator: ^14.0.2  # Upgraded to latest

  # Networking
  http: ^1.3.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Permissions
  permission_handler: ^12.0.1  # Upgraded

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/